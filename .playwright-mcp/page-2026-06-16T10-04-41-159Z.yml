            - paragraph [ref=e684]:
              - text: Born at the end of the Era of Strife, Miya bore witness to the unspeakable tragedies that befell the
              - link "elves" [ref=e685] [cursor=pointer]:
                - /url: /wiki/Elf
              - text: during the Endless War. She saw how the
              - link "Abyss" [ref=e686] [cursor=pointer]:
                - /url: /wiki/Abyss
              - text: defiled the Shadow Swamp and corrupted many of her people into Dark Elves. It was not until the Moon Goddess created the Lunar Aegis over
              - link "Azrya" [ref=e687] [cursor=pointer]:
                - /url: /wiki/Azrya_Woodlands
              - text: that the Moon Elves were able to thrive again under its protection. Miya became the Priestess of the Moon, and for thousands of years she served faithfully in the Lunar Temple, diligently watching over her people. However, with the continued expansion of the Abyss and its dark legions, the
              - link "Land of Dawn" [ref=e688] [cursor=pointer]:
                - /url: /wiki/Land_of_Dawn
              - text: is once again shrouded by the fog of war. From the Moonlit Forest, a call to war that has not been heard in thousands of years sounded again. Miya took up her silver bow and swore by the light of the moon to fight for her people.
            - heading "Bio" [level=3] [ref=e689]
            - paragraph [ref=e690]:
              - text: "\"What is war, brother?\""
              - text: "\"When the races of the Land of Dawn turned on one another instead of embracing unity and mutual prosperity, that is war. When they invaded their neighbors and razed cities to the ground, that is a war. When they choose destruction over peace, cruelty over benevolence, and corruption over purity... that is war.\""
              - text: "\"Peace, benevolence, and purity... is that your wish for the world?\""
              - link "Estes" [ref=e691] [cursor=pointer]:
                - /url: /wiki/Estes
              - text: did not reply. The outstretched branches of the Tree of Life wrapped around him, and he fell back into deep slumber.
              - text: This time he would not awaken again for many years. Long enough for Miya to grow from a little girl, who couldn't even reach the branches of the Tree of Life, into a fearless warrior and protector of the Moonlit Forest.
            - paragraph [ref=e692]:
              - text: Miya stood atop the trees and scouted the enemy incursion. A warband of orcs and demons had just broken through the border, inflicting a wound on the Lunar Aegis that caused the Tree of Life to shake. With a draw of her bow, three silvery beams of moonlight gracefully danced through the branches before swiftly slaying the leader and sending the rest fleeing in disarray. With the threat gone, the elves channeled the energy from the Tree of Life to repair the breach and restore the Aegis. Peace returned to the forest and all was well.
              - text: Miya, nestled wearily in the trees, had assumed the responsibility of protecting the Moonlit Forest after her brother Estes went into slumber to preserve the energy of the Lunar Aegis. In the beginning, Estes would speak to Miya through the Tree of Life, and it was through these conversations that she learned of the peace, benevolence, and purity that her brother longed for. And in Estes's absence, Miya watched over the forest according to the last words he spoke.
              - text: As she relaxed and put down her bow, Miya noticed that she had bruised her hand while dealing with the intruders. She began to recall the times when she practised archery while her brother studied nearby. As a somewhat stubborn child, Miya would often shoot her bow incessantly trying to hit a leaf or branch, until her fingers bled. Her brother would look up from his scroll and, with a wave of his hand, heal her wounds with the forest' magic.
              - text: Perhaps Miya was too attached to the past. She often found herself longing for a time when she could still hide under her brother's protection. Miya snapped back to attention and clenched her fist. This was no time to dwell on the past. She knew the only direction for her was forward, for she had become the hope that her people looked to in these dire times.
              - text: But Miya knew deep down she was only lying to herself. She turned a blind eye to the outside world as evil gained strength, and only acted when the enemy encroached on her lands. While this has kept the elves from war, how long would it last? Even a fool could see she was delaying the inevitable. A war that's never fought can never be won.
              - text: But peace, benevolence, and purity were her brother's wishes. How could she willingly plunge her people into the horrors of war? She could not; she would not.
            - paragraph [ref=e693]:
              - text: But war comes and goes as it wishes, and it would come suddenly for the Moon Elves one bloodstained dawn. The orc shock troops tore through the Aegis. But unlike previous attacks, the orcs seemed far more savage this time, as if they've been sent into a mindless bloodlust by dark magic. Black smoke permeated through the forest as the elves awoke to screams and the crackling of burning trees. Great pillars of smoke could be seen from the direction of the Tree of Life.
              - text: War was here.
              - text: "\"Run! Get out of the forest! Our home is lost, save yourselves!\""
              - text: Miya heard the desperate cries, and before she could act, most of her people were already fleeing in panic.
            - paragraph [ref=e694]:
              - text: "\"Brother... give me an answer!\""
              - text: Miya made one last plea to the Tree of Life as smoke enveloped her, hoping for salvation, but the tree remained silent amidst the scorched Earth.
              - text: Miya looked around at her home, the place where the first oracle emerged from the Tree of Life; the place where the elves first took root; the place where their branches grew into a great empire; the place where the last pure Moon Elves stood firm against the Abyss's corruption. This was their most sacred ground, blessed by the Moon Goddess herself, and Estes's hope for their future.
            - paragraph [ref=e695]:
              - text: "\"What is war...\""
              - text: She finally found her answer.
              - text: "\"When we have been pushed to the brink of destruction and finally take up arms for our very survival, that is war. When we must defend our last home, the Moonlit Forest, at any cost, that is war.\""
              - text: The Moon Elves heard Miya's words and looked back to their home.
              - text: "\"My people! We have suffered for too long... lived in a fear for too long. There is nowhere left for us to run. If the Moonlit Forest falls, then we will truly have lost everything. Who will stand with me one last time?\""
              - text: At first, a few dozen elven warriors stepped out from the trees. Then hundreds more followed, holding swords, spears, and bows. As they rushed to Miya's side, their silver hair shimmered like cascading moonlight upon the battlefield.
              - text: The Tree of Life, too, answered Miya's call. Using its precious energy, the tree spread its roots in all directions to smother the raging fires, and reinvigorated the Moon Elves for a final counter attack.
              - text: The Moon Elves rushed out from the trees and caught the Abyss legion completely off guard. They quickly gained the upper hand and pressed their attack until every invader was driven out of the Moonlit Forest. The surviving orcs came to their senses as their bloodlust subsided, and gained a newfound respect for the elves.
            - paragraph [ref=e696]:
              - text: "\"I understand now, brother.\""
              - text: "\"Peace, benevolence, and purity are what you wished for, but if we lose our home, our way of life, then all our efforts will be for naught. If war is already upon our doorstep, then we will meet it head on. We are prepared to sacrifice everything for our home. Give me the strength, courage and faith to protect our people, and our homeland!\""
