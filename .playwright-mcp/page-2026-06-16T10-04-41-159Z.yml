            - heading "Trivia" [level=2] [ref=e1240]
            - list [ref=e1241]:
              - listitem [ref=e1242]: In Japanese, "Miya" (宮) means "shrine" or "palace," often referring to sacred places or nobility. This fits Miya's elegant and mystical Moon Elf background.
              - listitem [ref=e1243]:
                - text: She is somewhat inspired by
                - link "Lufia" [ref=e1244] [cursor=pointer]:
                  - /url: https://magicrush.fandom.com/wiki/Lufia
                - text: from Magic Rush, a game created by
                - link "Moonton" [ref=e1245] [cursor=pointer]:
                  - /url: /wiki/Moonton
                - text: before MLBB. Miya's skin Jungle Ranger is somewhat resemble to her.
              - listitem [ref=e1246]:
                - text: In the game, Miya is the first hero and the first
                - link "marksman" [ref=e1247] [cursor=pointer]:
                  - /url: /wiki/Marksman
                - text: released
                - link "according to sale time." [ref=e1248] [cursor=pointer]:
                  - /url: /wiki/List_of_heroes
              - listitem [ref=e1249]: She is the first hero to have a running animation when having a high movement speed attribute.
              - listitem [ref=e1250]:
                - text: "She is one of the three heroes that appear on the Mobile Legends: Bang Bang application icons, the other two are"
                - generic [ref=e1251]:
                  - generic "Layla" [ref=e1254]:
                    - img "Layla" [ref=e1255]
                  - link "Layla" [ref=e1257] [cursor=pointer]:
                    - /url: /wiki/Layla
                - text: for the game's Chinese version, and
                - generic [ref=e1258]:
                  - generic "Gusion" [ref=e1261]:
                    - img "Gusion" [ref=e1262]
                  - link "Gusion" [ref=e1264] [cursor=pointer]:
                    - /url: /wiki/Gusion
                - text: for the game's
                - link "Indian version" [ref=e1265] [cursor=pointer]:
                  - /url: /wiki/Moba_Legends:_5v5!
                - text: .
              - listitem [ref=e1266]: Miya's Honor skin is a giveaway skin to celebrate the summer vacation in the Philippines.
              - listitem [ref=e1267]: "Her skin, Suzuhime (鈴姫) is Japanese and can be broken down into two parts: 鈴 (Suzu) – Means \"bell\" or \"chime,\" often associated with gentle, pleasant sounds. 姫 (Hime) – Means \"princess\" or \"young noblewoman.\""
              - listitem [ref=e1268]: "One of her most famous lines: \"Where there is life, there is hope\" reflects her role as a guardian of nature and life."
              - listitem [ref=e1269]:
                - text: Miya was one of the heroes revamped in
                - link "Project NEXT" [ref=e1270] [cursor=pointer]:
                  - /url: /wiki/Project_NEXT_2020
                - text: ’s first batch in September 2020, along with
                - generic [ref=e1271]:
                  - generic "Layla" [ref=e1274]:
                    - img "Layla" [ref=e1275]
                  - link "Layla" [ref=e1277] [cursor=pointer]:
                    - /url: /wiki/Layla
                - text: ","
                - generic [ref=e1278]:
                  - generic "Eudora" [ref=e1281]:
                    - img "Eudora" [ref=e1282]
                  - link "Eudora" [ref=e1284] [cursor=pointer]:
                    - /url: /wiki/Eudora
                - text: (whom Miya also shares the same Japanese-language voice actor, Morisaki Miho, with),
                - generic [ref=e1285]:
                  - generic "Zilong" [ref=e1288]:
                    - img "Zilong" [ref=e1289]
                  - link "Zilong" [ref=e1291] [cursor=pointer]:
                    - /url: /wiki/Zilong
                - text: and
                - generic [ref=e1292]:
                  - generic "Saber" [ref=e1295]:
                    - img "Saber" [ref=e1296]
                  - link "Saber" [ref=e1298] [cursor=pointer]:
                    - /url: /wiki/Saber
                - text: . The goal was to balance the power gap between older and newer heroes, as the latter had better mechanics and animations.
