            - list [ref=e1122]:
              - listitem [ref=e1123]: The old Balmond design can still be seen in his "Bloodthirst" skill icon.
              - listitem [ref=e1124]:
                - text: The previous iteration of Balmond was probably inspired by the character
                - link "Axe" [ref=e1125] [cursor=pointer]:
                  - /url: https://dota.fandom.com/wiki/Axe
                - text: "from Dota: Allstars, which itself is based on"
                - link "Grommash Hellscream" [ref=e1126] [cursor=pointer]:
                  - /url: https://wowpedia.fandom.com/wiki/Grommash_Hellscream
                - text: in his current lore. His current voice actor in 2021,
                - link "Patrick Seitz" [ref=e1127] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Patrick_Seitz
                - text: ", is known for his voice acting as"
                - link "Garrosh Hellscream" [ref=e1128] [cursor=pointer]:
                  - /url: https://wowpedia.fandom.com/wiki/Garrosh_Hellscream
                - text: ", Grommash's son."
              - listitem [ref=e1129]:
                - text: In his old lore, he went from being
                - generic [ref=e1130]:
                  - generic "Alice" [ref=e1133]:
                    - img "Alice" [ref=e1134]
                  - link "Alice" [ref=e1136] [cursor=pointer]:
                    - /url: /wiki/Alice
                - text: "'s slave to being a mutually exploited ally in the new lore."
              - listitem [ref=e1137]:
                - text: Balmond's "Celestial General" (now "God of Mountains") is the skin with the longest release postponement; it was supposed to be released at 2018 but the skin was released on August 2021 for the
                - link "Grand Collection" [ref=e1138] [cursor=pointer]:
                  - /url: /wiki/Grand_Collection
                - text: event.
              - listitem [ref=e1139]: Balmond is notorious within the community as he can be seen in almost every MLBB Google Ads.
