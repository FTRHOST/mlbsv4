            - heading "Trivia" [level=2] [ref=e1116]
            - figure "\"Bloodthirst\" skill icon." [ref=e1117]:
              - link "\"Bloodthirst\" skill icon." [ref=e1118] [cursor=pointer]:
                - /url: https://static.wikia.nocookie.net/mobile-legends/images/3/34/Bloodthirst.png/revision/latest?cb=20220624121727
