                  - cell "”" [ref=e726]
            - paragraph [ref=e727]:
              - text: Balmond is the leader of the Orcs, leading the Orc army against the invasion of the Demons. During a battle, he consumed the blood of a Blood Demon and went into a rage. This aroused
              - link "Alice" [ref=e728] [cursor=pointer]:
                - /url: /wiki/Alice
              - text: "'s interest, so she signed a contract with Balmond on the condition of returning the Stormeye Wasteland. Balmond, and his Orc army have since fought for the Demons."
            - heading "Lore" [level=3] [ref=e729]
            - paragraph [ref=e730]:
              - text: The Orcs are a race with a long history and perhaps the most common of those in the
              - link "Land of Dawn" [ref=e731] [cursor=pointer]:
                - /url: /wiki/Land_of_Dawn
              - text: . Throughout the mists of time, they have served under Lord of Abyss as they fought throughout the fierce of Endless War; and also engaged mankind in savage battle during the Golden Era. A series of successive defeats left the once strong United Demi-humans divided instead into Orcs, Minotaurs, and Centaurs, among other peoples. It also left them bereft of their home, forced into exile, and the southern lands where they eked out a meagre [
              - link "sic" [ref=e733] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/sic
              - text: "] existence."
            - paragraph [ref=e734]:
              - text: Despite all this, it seemed fate had not yet finished toying with this ancient race. As the
              - link "Abyss" [ref=e735] [cursor=pointer]:
                - /url: /wiki/Abyss
              - text: encroach once more powerful demons emerged again from the south presenting a perilous threat to their declining Orc populations. Under the demons' oppression the Orcs were made to split into several small clans scattered throughout the vast expanse of the roaring wilderness, exploited to the utmost.
            - paragraph [ref=e736]: Balmond was born in a traditional orc tribe within the Roaring Wilderness, and from a young age his father had always taught him all kinds of combat skills. Along with this, he would also regale him tiles of the Orcs' former glories; how they once resided in their homeland in the north of Lantis Mountains and their millennia of fierce battles waged against the elves and humans. He hoped that Balmond would, one day, be able to become a true Orc leader and return them to their former glory.
            - paragraph [ref=e737]: Over twenty years later, Balmond had grown into a mighty Orc under his father's teaching. And during this time, the demons' brutality had instilled Balmond with deep, dark memories, only making him yearn even more for the day when the Orcs could return to power, bringing back their once-formidable kingdom. To this end the young Balmond not only trained relentlessly, but also dedicated himself to studying all kinds of ancient Orc tomes, which gifted him with an astute strategic knowledge.
            - paragraph [ref=e738]: "But this was when the flames of war were just beginning to kindle. In order to amass the strength required to attack the Empire, the terrible demons invaded the Orc tribes tirelessly, plundering and pillaging their resources causing the Orcs unspeakable suffering. Prior to this the Orcs were powerless to resist the demon forces, and had no choice but to submit to preserve the peace, however short-lived it may be. But this time, Balmond led the warriors of his clan into battle and slayed the demon leader who had come to rob them of their resources, in doing so sparking the Orc rebellion. The Orc race had taken enough of the demons' oppression, and now each tribe lent Balmond their strength: they were no longer scattered clans, instead becoming a truly powerful force to be reckoned with. The rebellion spread throughout the Roaring Wilderness like wildfire."
            - paragraph [ref=e739]: Under Balmond's command, the fierce Orc warriors successfully fought back the demon armies that came to suppress them, dealing a heavy blow.
            - paragraph [ref=e740]: This gigantic counterattack launched by the Orcs shocked the demons, enraging Lord Lava, Thamuz. He dispatched numerous terrible troops formed of Blood Demons and Fiends to the Roaring Wilderness, as he would never stand for resistance against his demons within the Wretched Expanse.
            - paragraph [ref=e741]: Despite the disparity in power, a relentless fight to the death between the Orcs and demons was raged, yet the latter surged like tidal waves and things began to take a turn for the worse for the Orcs. Their power waned by the day, their defensive lines shrinking until they were entirely surrounded.
            - paragraph [ref=e742]: "To protect his race from extinction, Balmond decided he would fight right to the bitter end, and led an effort to break through their ranks. In this blazing battle the demons again flooded in, their numbers seemingly infinite, and the bodies of Orc warriors were strewn all around as they advanced. Balmond shook with fury: and cast aside his now-blunted battleax as he gripped a demon by the neck to bite at its throat, severing its head with his teeth."
            - paragraph [ref=e743]: Yet this attack sent copious amounts of demon blood flowing into Balmond's body, which resulted in an incredible transformation. It fueled him as he went utterly berserk, with unimaginable power that he wielded to break through the enemy lines. The Orcs were showered in demon blood, igniting a fearsome battle power within them that shook their demon oppressors to their core. New possibilities had presented themselves, and this caused them to change their plans on wiping out the Orcs.
            - paragraph [ref=e744]:
              - text: To this end, the cunning
              - link "Alice" [ref=e745] [cursor=pointer]:
                - /url: /wiki/Alice
              - text: "managed to track down Balmond and present him with an offer: once the Empire had been defeated, the entire Roaring Wilderness would be returned to the Orc peoples in exchange for Balmond's loyalty to the demons. In order to preserve the power of his Orc brethren, Balmond reached an agreement with Alice, and his forces swore loyalty to the Abyss. They would then serve as the demons' vanguard forces as they stormed"
              - link "Azrya" [ref=e746] [cursor=pointer]:
                - /url: /wiki/Azrya_Woodlands
              - text: .
            - paragraph [ref=e747]: However, even Alice could never have imagined that an even greater plan had been brewing deep in Balmond's mind. First, he would command the demon forces to breach the Moonlit Forest and occupy the elven kingdom, where he would build his strength steadily.
            - paragraph [ref=e748]: Following that, the union of the Orcs and the revival of their kingdom that they'd yearned for over millennia would finally come to be.
