<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../../../shared/css/common.css">
    <style>
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .akan-dimulai { color: white; font-size: 36px; text-transform: uppercase; }
        .timer-val { color: white; font-size: 120px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="timer-container">
        <div class="akan-dimulai">AKAN DIMULAI</div>
        <div id="timer" class="timer-val">00:00</div>
    </div>

    <script>
        const timerEl = document.getElementById('timer');
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}`);
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === "next_match_update") {
                const payload = data.payload;
                const m = Math.floor(payload.timer / 60).toString().padStart(2, '0');
                const s = (payload.timer % 60).toString().padStart(2, '0');
                timerEl.innerText = `${m}:${s}`;
            }
        };
    </script>
</body>
</html>
