<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../../../shared/css/common.css">
    <style> .bo-format { color: white; font-size: 24px; letter-spacing: 2px; } </style>
</head>
<body>
    <div id="bo" class="bo-format">BO3</div>
    <script src="../../../shared/js/socket.js"></script>
    <script>
        const el = document.getElementById('bo');
        window.addEventListener('mlbb_live_data', (e) => {
            const t = e.detail.tournament;
            if (t) el.innerText = t.blue.bo || "BO3";
        });
    </script>
</body>
</html>
