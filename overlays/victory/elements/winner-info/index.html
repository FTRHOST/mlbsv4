<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../../../shared/css/common.css">
    <style>
        .winner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .box { position: relative; width: 356px; height: 53px; display: flex; justify-content: center; align-items: center; }
        .bg { position: absolute; width: 100%; height: 100%; }
        .name-team { position: relative; color: #ffffff; font-size: 36px; z-index: 1; }
    </style>
</head>
<body>
    <div class="winner-container">
        <div class="box">
            <img class="bg" src="../../../assets/component/rectangle-380.svg">
            <div id="winner-name" class="name-team">NAMA TEAM</div>
        </div>
    </div>

    <script>
        const nameTeamEl = document.getElementById('winner-name');
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}`);
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === "match_victory") {
                const winnerName = data.payload.winnerName;
                const winnerCamp = data.payload.winnerCamp;
                if (winnerName && winnerName !== "NO TEAM") {
                    nameTeamEl.innerText = winnerName;
                } else {
                    nameTeamEl.innerText = (winnerCamp === 1) ? "BLUE TEAM" : "RED TEAM";
                }
            }
        };
    </script>
</body>
</html>
